services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scheduling
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/scheduling
    env_file:
      - path: .env.local
        required: true
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    # Push schema on every start (safe to re-run; no-ops when up-to-date)
    command: sh -c "npx prisma db push && npm start"

volumes:
  postgres_data:
