<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Calendar body -->
  <rect x="2" y="5" width="28" height="25" rx="3" fill="white" stroke="#0070f3" stroke-width="2"/>
  <!-- Header bar -->
  <rect x="2" y="5" width="28" height="9" rx="3" fill="#0070f3"/>
  <rect x="2" y="11" width="28" height="3" fill="#0070f3"/>
  <!-- Binding posts -->
  <rect x="9" y="2" width="3" height="7" rx="1.5" fill="#0070f3"/>
  <rect x="20" y="2" width="3" height="7" rx="1.5" fill="#0070f3"/>
  <!-- Clock circle -->
  <circle cx="16" cy="22" r="7" fill="white" stroke="#0070f3" stroke-width="1.5"/>
  <!-- Clock hands -->
  <line x1="16" y1="22" x2="16" y2="17.5" stroke="#0070f3" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="22" x2="19.5" y2="24" stroke="#0070f3" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Clock center dot -->
  <circle cx="16" cy="22" r="1" fill="#0070f3"/>
</svg>
